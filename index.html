<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>⚔️ BATTLE CASTLE 3D</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#04070d;font-family:'Cinzel',serif;}
  #canvas-root{position:fixed;inset:0;z-index:0;}
  .font-cinzel{font-family:'Cinzel',serif;}
  .font-medieval{font-family:'MedievalSharp',cursive;}
  .panel{background:rgba(15,12,8,0.78);backdrop-filter:blur(6px);border:1px solid rgba(212,175,55,0.35);}
  .glow-gold{text-shadow:0 0 8px rgba(255,210,90,0.7);}
  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:#9c7a2c;border-radius:4px;}
  input,select{-webkit-user-select:text;user-select:text;touch-action:manipulation;}
  .sand-fill{transform-origin:bottom;transition:transform 1s linear;}
  .crackle{animation:crackle 2.4s linear infinite;}
  @keyframes crackle{0%,100%{opacity:.7}50%{opacity:1}}
  .opt-btn{transition:.15s; }
  .opt-btn:active{transform:scale(.96);}
  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body class="text-amber-50">

<div id="canvas-root"></div>

<!-- ================= SETUP SCREEN ================= -->
<div id="setup-screen" class="fixed inset-0 z-30 flex items-center justify-center p-3 overflow-y-auto bg-black/60">
  <div class="panel rounded-2xl p-6 md:p-8 w-full max-w-2xl my-6">
    <h1 class="text-3xl md:text-4xl font-cinzel font-black text-center text-amber-300 glow-gold mb-1">⚔️ BATTLE CASTLE 3D</h1>
    <p class="text-center text-amber-200/70 font-medieval mb-6">Cinco reinos. Un pasado simple. Una sola corona.</p>
    <div id="player-inputs" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-5"></div>
    <button id="start-btn" type="button" class="w-full py-3 rounded-xl bg-gradient-to-r from-amber-600 to-yellow-500 text-stone-900 font-cinzel font-black text-lg shadow-lg hover:brightness-110 active:scale-95 transition">🏰 COMENZAR LA GUERRA</button>
  </div>
</div>

<!-- ================= HUD ================= -->
<div id="hud" class="hidden">
  <div class="fixed top-2 left-2 right-2 md:right-auto md:w-80 z-20 panel rounded-xl p-3 max-h-[40vh] md:max-h-[80vh] overflow-y-auto">
    <h2 class="font-cinzel font-bold text-amber-300 text-sm mb-2 tracking-widest">👑 REINOS</h2>
    <div id="ranking-list" class="space-y-2 text-xs"></div>
  </div>

  <div class="fixed top-2 right-2 z-20 panel rounded-xl p-3 w-44 text-center">
    <div class="text-[10px] tracking-widest text-amber-300/80 mb-1">TURNO DE</div>
    <div id="turn-name" class="font-cinzel font-black text-lg text-amber-100">-</div>
    <div class="mt-2 mx-auto w-8 h-12 border-2 border-amber-400/60 rounded-sm relative overflow-hidden bg-black/40">
      <div id="sand-fill" class="sand-fill absolute bottom-0 left-0 right-0 bg-amber-400" style="height:100%"></div>
    </div>
    <div id="timer-num" class="text-amber-200 text-xs mt-1">15s</div>
  </div>

  <div class="fixed bottom-2 left-2 right-2 md:right-auto md:w-80 z-20 panel rounded-xl p-3 max-h-[26vh] overflow-y-auto">
    <h2 class="font-cinzel font-bold text-amber-300 text-sm mb-1 tracking-widest">📜 BITÁCORA</h2>
    <div id="log-list" class="space-y-1 text-[11px] text-amber-100/90"></div>
  </div>

  <button id="camera-reset" type="button" class="fixed bottom-2 right-2 z-20 panel rounded-xl px-3 py-2 text-xs font-cinzel hover:bg-amber-900/40">🧭 Centrar cámara</button>
</div>

<!-- ================= QUESTION MODAL ================= -->
<div id="question-modal" class="hidden fixed inset-0 z-40 items-center justify-center bg-black/70 p-3">
  <div class="panel rounded-2xl p-6 w-full max-w-md text-center fade-in">
    <div class="text-amber-300/70 text-xs tracking-widest mb-1" id="q-player-label">JUGADOR</div>
    <div class="text-stone-300 text-sm mb-2 font-medieval">¿Cuál es el infinitivo de este verbo en pasado simple?</div>
    <h3 id="question-verb" class="text-4xl md:text-5xl font-cinzel font-black text-amber-200 glow-gold mb-5">WENT</h3>
    <div id="q-options" class="grid grid-cols-1 gap-2"></div>
    <div id="q-feedback" class="mt-3 text-sm font-bold"></div>
  </div>
</div>

<!-- ================= TARGET SELECT BANNER ================= -->
<div id="target-banner" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 z-20 panel rounded-xl px-5 py-2 text-center">
  <span class="text-amber-200 font-cinzel font-bold text-sm">🎯 ¡Elige un castillo enemigo para atacar!</span>
</div>

<!-- ================= CHEST MODAL ================= -->
<div id="chest-modal" class="hidden fixed inset-0 z-40 items-center justify-center bg-black/70 p-3">
  <div class="panel rounded-2xl p-5 w-full max-w-3xl text-center fade-in">
    <h3 class="text-2xl font-cinzel font-black text-amber-300 mb-1">🎁 COFRES DEL REINO</h3>
    <p class="text-amber-200/70 text-xs mb-4 font-medieval">Elige un cofre, valiente conquistador...</p>
    <div id="chest-grid" class="grid grid-cols-5 gap-2 md:gap-3"></div>
    <div id="chest-result" class="mt-4 text-lg font-bold min-h-[2rem]"></div>
    <button id="chest-close" type="button" class="hidden mt-3 px-5 py-2 rounded-lg bg-amber-600 text-stone-900 font-bold">Continuar</button>
  </div>
</div>

<!-- ================= WIN MODAL ================= -->
<div id="win-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/85 p-3">
  <div class="panel rounded-2xl p-8 text-center max-w-md fade-in">
    <div class="text-6xl mb-3">👑</div>
    <h2 class="text-3xl font-cinzel font-black text-amber-300 mb-2" id="win-title">¡VICTORIA!</h2>
    <p class="text-amber-100 font-medieval mb-5" id="win-sub"></p>
    <button onclick="location.reload()" type="button" class="px-6 py-3 rounded-xl bg-gradient-to-r from-amber-600 to-yellow-500 text-stone-900 font-cinzel font-black">🔄 NUEVA GUERRA</button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ===========================================================
   A. VERB BANK
=========================================================== */
const VERB_BANK = [
  { past:"ATE", correct:"EAT", options:["EAT","DRINK","WRITE"] },
  { past:"SAW", correct:"SEE", options:["SEE","SAY","SING"] },
  { past:"WENT", correct:"GO", options:["GO","WANT","WALK"] },
  { past:"DRANK", correct:"DRINK", options:["DRINK","DRAW","DRIVE"] },
  { past:"BOUGHT", correct:"BUY", options:["BUY","BRING","BUILD"] },
  { past:"MADE", correct:"MAKE", options:["MAKE","MEET","MEAN"] },
  { past:"TOOK", correct:"TAKE", options:["TAKE","TALK","TELL"] },
  { past:"CAME", correct:"COME", options:["COME","CALL","CATCH"] },
  { past:"WROTE", correct:"WRITE", options:["WRITE","WORK","WIN"] },
  { past:"SANG", correct:"SING", options:["SING","SIT","SLEEP"] },
  { past:"SPOKE", correct:"SPEAK", options:["SPEAK","SPEND","STAND"] },
  { past:"RAN", correct:"RUN", options:["RUN","READ","RIDE"] },
  { past:"SLEPT", correct:"SLEEP", options:["SLEEP","SELL","SEND"] },
  { past:"SWAM", correct:"SWIM", options:["SWIM","SWEAR","SWEEP"] },
  { past:"HAD", correct:"HAVE", options:["HAVE","HEAR","HIDE"] },
  { past:"DID", correct:"DO", options:["DO","DIG","DRAW"] },
  { past:"GAVE", correct:"GIVE", options:["GIVE","GROW","GET"] },
  { past:"THOUGHT", correct:"THINK", options:["THINK","THROW","TEACH"] },
  { past:"FELL", correct:"FALL", options:["FALL","FEEL","FIND"] },
  { past:"FLEW", correct:"FLY", options:["FLY","FLOW","FORGET"] },
  { past:"HEARD", correct:"HEAR", options:["HEAR","HELP","HURT"] },
  { past:"KEPT", correct:"KEEP", options:["KEEP","KNOW","KILL"] },
  { past:"LEFT", correct:"LEAVE", options:["LEAVE","LOSE","LAUGH"] },
  { past:"MET", correct:"MEET", options:["MEET","MIND","MOVE"] },
  { past:"PAID", correct:"PAY", options:["PAY","PLAY","PUT"] },
  { past:"SOLD", correct:"SELL", options:["SELL","SEND","SHAKE"] },
  { past:"TOLD", correct:"TELL", options:["TELL","THINK","TEAR"] },
  { past:"STOOD", correct:"STAND", options:["STAND","SPEAK","STEAL"] },
  { past:"WON", correct:"WIN", options:["WIN","WRITE","WEAR"] },
  { past:"BROKE", correct:"BREAK", options:["BREAK","BRING","BUILD"] }
];

/* ===========================================================
   B. BIOMES / KINGDOMS CONFIG (matches reference layout: 4 corners + center)
=========================================================== */
const KINGDOMS = [
  { key:"forest",  name:"Valle Frondoso", color:0x1f8b4d, accent:0x2ecc71, pos:[-34,0,-34] },
  { key:"desert",  name:"Desierto Dorado", color:0xd4a72c, accent:0xf1c40f, pos:[34,0,-34] },
  { key:"volcano", name:"Tierras Volcánicas", color:0x8b1a1a, accent:0xe74c3c, pos:[34,0,34] },
  { key:"ice",     name:"Costa Helada", color:0x4ea0c9, accent:0xaee9ff, pos:[-34,0,34] },
  { key:"mystic",  name:"Páramo Místico", color:0x6c3fa3, accent:0xb98cf2, pos:[0,0,0] }
];

/* ===========================================================
   C. GAME STATE
=========================================================== */
let gameState = {
  players: [],
  turnIndex: 0,
  phase: "setup",
  currentQuestion: null,
  selectedAttacker: null,
  timer: null,
  timeLeft: 15,
  usedQuestions: []
};

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ===========================================================
   D. SETUP SCREEN
=========================================================== */
const playerInputsEl = document.getElementById("player-inputs");
KINGDOMS.forEach((k,i)=>{
  const wrap = document.createElement("div");
  wrap.className = "flex items-center gap-2 bg-black/30 rounded-lg px-3 py-2 border border-amber-900/40";
  wrap.innerHTML = `<span class="text-xl">${["🌳","🏜️","🌋","❄️","🔮"][i]}</span>
    <input type="text" inputmode="text" autocomplete="off" maxlength="14" data-idx="${i}"
      class="player-name-input bg-transparent flex-1 outline-none text-amber-50 placeholder-amber-200/40 font-medieval text-base"
      placeholder="${k.name}" />`;
  playerInputsEl.appendChild(wrap);
});

document.getElementById("start-btn").addEventListener("click", startGame);

function startGame(){
  const inputs = document.querySelectorAll(".player-name-input");
  gameState.players = KINGDOMS.map((k,i)=>{
    const v = inputs[i].value.trim();
    return {
      key:k.key, name: v || k.name, kingdom:k.name, color:k.color, accent:k.accent,
      hp:5, alive:true, shields:0, hammers:0, bombs:0
    };
  });
  document.getElementById("setup-screen").classList.add("hidden");
  document.getElementById("hud").classList.remove("hidden");
  initThree();
  buildWorld();
  renderRanking();
  startAudio();
  nextTurn();
}

/* ===========================================================
   E. THREE.JS SETUP
=========================================================== */
let scene, camera, renderer, controls, raycaster, clock;
let castleGroups = {}; // key -> {group, parts...}
let kingFloats = [];
let flameSystems = {};
let smokeSystems = {};
let shakeTime = 0;
const mouse = new THREE.Vector2();

function initThree(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1622);
  scene.fog = new THREE.Fog(0x0a1622, 60, 220);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 60, 95);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  document.getElementById("canvas-root").appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 35;
  controls.maxDistance = 140;
  controls.maxPolarAngle = Math.PI*0.47;
  controls.target.set(0,0,0);

  raycaster = new THREE.Raycaster();
  clock = new THREE.Clock();

  const hemi = new THREE.HemisphereLight(0xbfd8ff, 0x223018, 0.9);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xfff1d0, 1.1);
  sun.position.set(60,90,40);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left=-80; sun.shadow.camera.right=80;
  sun.shadow.camera.top=80; sun.shadow.camera.bottom=-80;
  scene.add(sun);

  window.addEventListener("resize", onResize);
  renderer.domElement.addEventListener("click", onCanvasClick);
  renderer.domElement.addEventListener("pointermove", onPointerMove);
  document.getElementById("camera-reset").addEventListener("click", ()=>{
    camera.position.set(0,60,95); controls.target.set(0,0,0);
  });

  animate();
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

/* ===========================================================
   F. WORLD BUILD
=========================================================== */
function buildWorld(){
  buildOcean();
  buildIslandTerrain();
  KINGDOMS.forEach(k=> buildCastle(k));
  buildMountains();
  buildSiegeLines();
  buildCompass();
}

function buildOcean(){
  const geo = new THREE.PlaneGeometry(400,400,1,1);
  const mat = new THREE.MeshPhongMaterial({color:0x115577, shininess:80, transparent:true, opacity:0.92});
  const ocean = new THREE.Mesh(geo, mat);
  ocean.rotation.x = -Math.PI/2;
  ocean.position.y = -1.4;
  ocean.receiveShadow = true;
  scene.add(ocean);
  ocean.userData.isOcean = true;
  window.__ocean = ocean;
}

function biomeColorAt(x,z){
  let best=null, bd=Infinity;
  KINGDOMS.forEach(k=>{
    const dx=x-k.pos[0], dz=z-k.pos[2];
    const d = dx*dx+dz*dz;
    if(d<bd){bd=d; best=k;}
  });
  return best.color;
}

function buildIslandTerrain(){
  const size = 90, seg = 60;
  const geo = new THREE.PlaneGeometry(size, size, seg, seg);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const colors = [];
  const color = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const distCenter = Math.sqrt(x*x+z*z);
    const edge = THREE.MathUtils.clamp(1 - distCenter/ (size*0.62), 0, 1);
    let h = Math.sin(x*0.18)*Math.cos(z*0.18)*0.8 + Math.sin(x*0.06+z*0.06)*1.6;
    h *= edge;
    h -= (1-edge)*3.2; // shoreline drop
    pos.setY(i, h);
    color.setHex(biomeColorAt(x,z));
    const shade = 0.85 + Math.random()*0.25;
    colors.push(color.r*shade, color.g*shade, color.b*shade);
  }
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({vertexColors:true, roughness:0.95, flatShading:true});
  const land = new THREE.Mesh(geo, mat);
  land.receiveShadow = true;
  land.castShadow = false;
  scene.add(land);
}

function buildMountains(){
  const coords = [[0,8],[-14,-2],[14,-2],[0,-16],[-8,16],[8,16],[-20,20],[20,20],[-20,-20],[20,-20]];
  coords.forEach(([x,z])=>{
    const h = 6 + Math.random()*7;
    const geo = new THREE.ConeGeometry(3+Math.random()*2, h, 6);
    const mat = new THREE.MeshStandardMaterial({color:0x5b5044, flatShading:true, roughness:1});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, h/2 - 1, z);
    m.rotation.y = Math.random()*Math.PI;
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  });
}

function buildCompass(){
  const g = new THREE.Group();
  const ring = new THREE.Mesh(new THREE.TorusGeometry(4,0.25,8,24), new THREE.MeshStandardMaterial({color:0xd4af37, metalness:0.6, roughness:0.3}));
  ring.rotation.x = Math.PI/2;
  g.add(ring);
  const needle = new THREE.Mesh(new THREE.ConeGeometry(0.5,3,4), new THREE.MeshStandardMaterial({color:0xff3b3b}));
  needle.rotation.x = Math.PI/2; needle.position.y=0.3;
  g.add(needle);
  g.position.set(-58, 0.5, -58);
  scene.add(g);
  window.__compass = g;
}

function buildSiegeLines(){
  const positions = KINGDOMS.map(k=> new THREE.Vector3(k.pos[0],4,k.pos[2]));
  const lineGroup = new THREE.Group();
  for(let i=0;i<positions.length;i++){
    for(let j=i+1;j<positions.length;j++){
      const a = positions[i], b = positions[j];
      const mid = a.clone().lerp(b,0.5); mid.y += 6;
      const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
      const pts = curve.getPoints(24);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineDashedMaterial({color:0xffd766, dashSize:1.2, gapSize:0.8, transparent:true, opacity:0.55});
      const line = new THREE.Line(geo, mat);
      line.computeLineDistances();
      lineGroup.add(line);
    }
  }
  scene.add(lineGroup);
  window.__siegeLines = lineGroup;
}

/* ===========================================================
   G. CASTLE BUILDER
=========================================================== */
function buildCastle(k){
  const group = new THREE.Group();
  group.position.set(k.pos[0], 0, k.pos[2]);

  // base platform
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(9,10,2.2,16),
    new THREE.MeshStandardMaterial({color:0x807260, roughness:1, flatShading:true})
  );
  base.position.y = 1.1;
  base.receiveShadow = true; base.castShadow = true;
  group.add(base);

  const wallMat = new THREE.MeshStandardMaterial({color:0xb9ada0, roughness:0.9, flatShading:true});
  const roofMat = new THREE.MeshStandardMaterial({color:0xc0392b, roughness:0.8, flatShading:true});

  // central wall
  const wall = new THREE.Mesh(new THREE.BoxGeometry(8,5,3), wallMat);
  wall.position.y = 2.2+2.5;
  wall.castShadow = true; wall.receiveShadow = true;
  group.add(wall);

  // crenellations
  for(let i=-3;i<=3;i+=2){
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.9,1,0.9), wallMat);
    c.position.set(i, 2.2+5.5, 0);
    c.castShadow = true;
    wall.userData.crenels = wall.userData.crenels||[];
    group.add(c);
  }

  // gate
  const gate = new THREE.Mesh(new THREE.BoxGeometry(2.2,3,0.6), new THREE.MeshStandardMaterial({color:0x5b3a1f, roughness:1}));
  gate.position.set(0, 2.2+1.6, 1.6);
  group.add(gate);

  // towers
  const towers = [];
  [-5,5].forEach((tx,idx)=>{
    const tGroup = new THREE.Group();
    const tower = new THREE.Mesh(new THREE.CylinderGeometry(1.8,2,8,10), wallMat);
    tower.position.y = 2.2+4;
    tower.castShadow = true; tower.receiveShadow = true;
    tGroup.add(tower);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(2.3,3.4,10), roofMat);
    roof.position.y = 2.2+8+1.4;
    roof.castShadow = true;
    tGroup.add(roof);
    tGroup.position.set(tx,0,0);
    tGroup.userData.collapsed = false;
    group.add(tGroup);
    towers.push(tGroup);
  });

  // standard / flag
  const poleMat = new THREE.MeshStandardMaterial({color:0x3a2a16});
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,4,6), poleMat);
  pole.position.set(0, 2.2+5+2, 0);
  group.add(pole);
  const flagGeo = new THREE.PlaneGeometry(2,1.3,6,4);
  const flagMat = new THREE.MeshStandardMaterial({color:k.accent, side:THREE.DoubleSide, flatShading:true});
  const flag = new THREE.Mesh(flagGeo, flagMat);
  flag.position.set(1, 2.2+6.6, 0);
  group.add(flag);

  // king floating above main tower
  const kingGroup = new THREE.Group();
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.55,8,8), new THREE.MeshStandardMaterial({color:0xffd9a0}));
  head.position.y = 1.4;
  kingGroup.add(head);
  const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.5,0.4,8), new THREE.MeshStandardMaterial({color:0xffd700, metalness:0.7, roughness:0.2}));
  crown.position.y = 1.95;
  kingGroup.add(crown);
  const cape = new THREE.Mesh(new THREE.ConeGeometry(0.8,1.8,8), new THREE.MeshStandardMaterial({color:k.accent, flatShading:true}));
  cape.position.y = 0.6;
  kingGroup.add(cape);
  kingGroup.position.set(0, 2.2+5+5.5, 0);
  group.add(kingGroup);
  kingFloats.push({mesh:kingGroup, baseY:kingGroup.position.y, phase:Math.random()*Math.PI*2});

  // damage layers (hidden by default)
  const cracks = new THREE.Mesh(new THREE.PlaneGeometry(7,4), new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.35, visible:false}));
  cracks.position.set(0, 2.2+2.5, 1.51);
  group.add(cracks);

  const gateCollapsed = new THREE.Mesh(new THREE.BoxGeometry(2.2,1,0.6), new THREE.MeshStandardMaterial({color:0x2b1c0e}));
  gateCollapsed.position.set(0, 2.2+0.5, 1.6);
  gateCollapsed.visible = false;
  group.add(gateCollapsed);

  scene.add(group);

  // pulse ring (for targeting hover)
  const pulse = new THREE.Mesh(new THREE.RingGeometry(9.5,11,32), new THREE.MeshBasicMaterial({color:0xff3030, transparent:true, opacity:0, side:THREE.DoubleSide}));
  pulse.rotation.x = -Math.PI/2;
  pulse.position.y = 0.05;
  group.add(pulse);

  castleGroups[k.key] = {group, base, wall, gate, gateCollapsed, towers, flag, cracks, pulse, kingGroup};

  flameSystems[k.key] = buildParticleSystem(0xff5500, 30, group);
  flameSystems[k.key].points.visible = false;
  smokeSystems[k.key] = buildParticleSystem(0x222222, 40, group);
  smokeSystems[k.key].points.visible = false;
}

function buildParticleSystem(colorHex, count, parent){
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count*3);
  const velocities = [];
  for(let i=0;i<count;i++){
    positions[i*3]= (Math.random()-0.5)*4;
    positions[i*3+1]= Math.random()*2;
    positions[i*3+2]= (Math.random()-0.5)*4;
    velocities.push({vy: 0.5+Math.random()*1.5, t: Math.random()*10});
  }
  geo.setAttribute("position", new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({color:colorHex, size:0.5, transparent:true, opacity:0.85});
  const points = new THREE.Points(geo, mat);
  points.position.y = 4;
  parent.add(points);
  return {points, velocities, count};
}

function updateParticleSystem(sys, dt){
  if(!sys.points.visible) return;
  const pos = sys.points.geometry.attributes.position;
  for(let i=0;i<sys.count;i++){
    let y = pos.getY(i) + sys.velocities[i].vy*dt;
    if(y>6){ y = 0; }
    pos.setY(i,y);
  }
  pos.needsUpdate = true;
}

/* ===========================================================
   H. DAMAGE VISUALS
=========================================================== */
function applyDamageVisuals(key, hp){
  const c = castleGroups[key];
  if(!c) return;
  c.cracks.material.visible = hp<=4 && hp>0;

  if(hp<=3 && hp>0 && !c.towers[1].userData.collapsed){
    c.towers[1].userData.collapsed = true;
    c.towers[1].rotation.z = -0.6;
    c.towers[1].position.y = -0.8;
  }
  flameSystems[key].points.visible = hp<=2 && hp>0;
  smokeSystems[key].points.visible = hp<=1 && hp>0;
  if(hp<=1 && hp>0){ c.gate.visible=false; c.gateCollapsed.visible=true; }

  if(hp<=0){
    destroyCastle(key);
  }
}

function destroyCastle(key){
  const c = castleGroups[key];
  if(!c || c.group.userData.destroyed) return;
  c.group.userData.destroyed = true;
  spawnExplosionDebris(c.group.position.clone().add(new THREE.Vector3(0,3,0)));
  let t=0;
  const fall = ()=>{
    t+=0.03;
    c.group.position.y -= 0.12;
    c.group.scale.multiplyScalar(0.965);
    c.group.rotation.y += 0.05;
    if(t<1.2) requestAnimationFrame(fall);
    else c.group.visible = false;
  };
  fall();
}

function spawnExplosionDebris(origin){
  const debris = [];
  for(let i=0;i<18;i++){
    const geo = new THREE.DodecahedronGeometry(0.4+Math.random()*0.5,0);
    const mat = new THREE.MeshStandardMaterial({color:0x6b5d4f, flatShading:true});
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(origin);
    scene.add(m);
    const vel = new THREE.Vector3((Math.random()-0.5)*8, Math.random()*7+3, (Math.random()-0.5)*8);
    debris.push({m, vel});
  }
  let t=0;
  const step = ()=>{
    t+=0.02;
    debris.forEach(d=>{
      d.vel.y -= 0.25;
      d.m.position.addScaledVector(d.vel,0.05);
      d.m.rotation.x+=0.1; d.m.rotation.y+=0.1;
      if(d.m.position.y < -1.4){ scene.remove(d.m); }
    });
    if(t<3) requestAnimationFrame(step);
    else debris.forEach(d=>scene.remove(d.m));
  };
  step();
  triggerShake(1.0);
}

/* ===========================================================
   I. PROJECTILE / CATAPULT
=========================================================== */
function fireProjectile(fromKey, toKey, onImpact){
  const from = castleGroups[fromKey].group.position.clone().add(new THREE.Vector3(0,6,0));
  const to = castleGroups[toKey].group.position.clone().add(new THREE.Vector3(0,4,0));

  const ball = new THREE.Mesh(new THREE.SphereGeometry(0.9,10,10), new THREE.MeshStandardMaterial({color:0xff4500, emissive:0xff2200, emissiveIntensity:0.7}));
  ball.position.copy(from);
  scene.add(ball);
  const fire = buildParticleSystem(0xffaa00, 14, ball);
  fire.points.position.set(0,0,0);
  fire.points.visible = true;

  const dist = from.distanceTo(to);
  const duration = THREE.MathUtils.clamp(dist*22, 700, 1800);
  const startTime = performance.now();
  const peak = Math.max(8, dist*0.28);

  function step(now){
    const t = Math.min(1, (now-startTime)/duration);
    const pos = from.clone().lerp(to, t);
    pos.y += Math.sin(Math.PI*t) * peak;
    ball.position.copy(pos);
    const fp = fire.points.geometry.attributes.position;
    for(let i=0;i<fire.count;i++){
      fp.setXYZ(i,(Math.random()-0.5)*0.8,(Math.random()-0.5)*0.8,(Math.random()-0.5)*0.8);
    }
    fp.needsUpdate = true;
    if(t<1){ requestAnimationFrame(step); }
    else{
      scene.remove(ball);
      spawnImpactShockwave(to);
      triggerShake(0.6);
      if(onImpact) onImpact();
    }
  }
  requestAnimationFrame(step);
}

function spawnImpactShockwave(pos){
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.2,0.6,24), new THREE.MeshBasicMaterial({color:0xffaa33, transparent:true, opacity:0.9, side:THREE.DoubleSide}));
  ring.rotation.x = -Math.PI/2;
  ring.position.copy(pos); ring.position.y = 0.3;
  scene.add(ring);
  let t=0;
  const step=()=>{
    t+=0.04;
    ring.scale.setScalar(1+t*14);
    ring.material.opacity = Math.max(0,0.9-t*1.2);
    if(t<1) requestAnimationFrame(step);
    else scene.remove(ring);
  };
  step();

  for(let i=0;i<14;i++){
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.25,6,6), new THREE.MeshBasicMaterial({color:0xffcc55}));
    m.position.copy(pos);
    scene.add(m);
    const vel = new THREE.Vector3((Math.random()-0.5)*6, Math.random()*5+2, (Math.random()-0.5)*6);
    let tt=0;
    const pstep=()=>{
      tt+=0.02;
      vel.y -= 0.2;
      m.position.addScaledVector(vel,0.05);
      m.material.opacity = Math.max(0,1-tt);
      if(tt<1.2) requestAnimationFrame(pstep);
      else scene.remove(m);
    };
    pstep();
  }
}

function triggerShake(intensity){ shakeTime = intensity; }

/* ===========================================================
   J. RAYCAST TARGET SELECTION
=========================================================== */
function onPointerMove(e){
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  if(gameState.phase !== "targeting") return;
  raycaster.setFromCamera(mouse, camera);
  Object.entries(castleGroups).forEach(([key,c])=>{
    const targetable = isTargetable(key);
    c.pulse.material.opacity = 0;
  });
  const hits = raycastCastles();
  if(hits.length){
    const key = hits[0];
    if(isTargetable(key)){
      castleGroups[key].pulse.material.opacity = 0.6 + Math.sin(performance.now()*0.01)*0.3;
      renderer.domElement.style.cursor = "pointer";
    }
  } else {
    renderer.domElement.style.cursor = "default";
  }
}

function raycastCastles(){
  raycaster.setFromCamera(mouse, camera);
  const found = [];
  Object.entries(castleGroups).forEach(([key,c])=>{
    if(c.group.userData.destroyed) return;
    const intersects = raycaster.intersectObject(c.group, true);
    if(intersects.length) found.push({key, dist:intersects[0].distance});
  });
  found.sort((a,b)=>a.dist-b.dist);
  return found.map(f=>f.key);
}

function isTargetable(key){
  if(gameState.phase !== "targeting") return false;
  const p = gameState.players.find(pl=>pl.key===key);
  if(!p || !p.alive) return false;
  if(key === gameState.selectedAttacker) return false;
  return true;
}

function onCanvasClick(){
  if(gameState.phase !== "targeting") return;
  const hits = raycastCastles();
  if(!hits.length) return;
  const key = hits[0];
  if(!isTargetable(key)) return;
  resolveAttack(gameState.selectedAttacker, key);
}

/* ===========================================================
   K. ANIMATION LOOP
=========================================================== */
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  kingFloats.forEach(k=>{
    k.mesh.position.y = k.baseY + Math.sin(t*1.5+k.phase)*0.3;
  });

  Object.values(castleGroups).forEach(c=>{
    c.flag.rotation.y = Math.sin(t*3)*0.3;
    c.flag.geometry.attributes.position && animateFlagCloth(c.flag, t);
  });

  Object.values(flameSystems).forEach(s=>updateParticleSystem(s,dt));
  Object.values(smokeSystems).forEach(s=>updateParticleSystem(s,dt));

  if(window.__ocean){ window.__ocean.position.y = -1.4 + Math.sin(t*0.6)*0.05; }
  if(window.__compass){ window.__compass.rotation.y += 0.003; }
  if(window.__siegeLines){
    window.__siegeLines.children.forEach((l,i)=>{ l.material.dashSize = 1.2+Math.sin(t+i)*0.2; });
  }

  if(shakeTime > 0){
    shakeTime = Math.max(0, shakeTime - dt*1.6);
    camera.position.x += (Math.random()-0.5)*shakeTime*1.2;
    camera.position.y += (Math.random()-0.5)*shakeTime*1.2;
  }

  controls.update();
  renderer.render(scene, camera);
}

function animateFlagCloth(flag, t){
  const pos = flag.geometry.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i);
    const wave = Math.sin(t*4 + x*2)*0.15*(x+1)/2;
    pos.setZ(i, wave);
  }
  pos.needsUpdate = true;
}

/* ===========================================================
   L. GAME FLOW
=========================================================== */
function alivePlayers(){ return gameState.players.filter(p=>p.alive); }

function nextTurn(){
  clearInterval(gameState.timer);
  const living = alivePlayers();
  if(living.length<=1){ return endGame(living[0]); }

  let tries=0;
  do{
    gameState.turnIndex = (gameState.turnIndex+1) % gameState.players.length;
    tries++;
  } while(!gameState.players[gameState.turnIndex].alive && tries<10);

  const player = gameState.players[gameState.turnIndex];
  document.getElementById("turn-name").textContent = player.name;
  gameState.phase = "question";
  askQuestion(player);
}

function askQuestion(player){
  const pool = VERB_BANK_AVAILABLE();
  const q = pool[Math.floor(Math.random()*pool.length)];
  gameState.currentQuestion = q;
  gameState.usedQuestions.push(q);
  if(gameState.usedQuestions.length > 18) gameState.usedQuestions.shift();

  document.getElementById("q-player-label").textContent = `${player.name.toUpperCase()} — ${player.kingdom}`;
  document.getElementById("question-verb").textContent = q.past;
  const optsEl = document.getElementById("q-options");
  optsEl.innerHTML = "";
  document.getElementById("q-feedback").textContent = "";
  shuffle(q.options).forEach(opt=>{
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "opt-btn w-full py-3 rounded-lg bg-stone-800/80 border border-amber-700/40 text-amber-100 font-cinzel font-bold hover:bg-amber-800/50";
    btn.textContent = opt;
    btn.addEventListener("click", ()=> handleAnswer(opt===q.correct, player, btn));
    optsEl.appendChild(btn);
  });

  document.getElementById("question-modal").classList.remove("hidden");
  document.getElementById("question-modal").classList.add("flex");
  startTimer(player);
}

function VERB_BANK_AVAILABLE(){
  const used = new Set(gameState.usedQuestions.map(q=>q.past));
  const fresh = VERB_BANK.filter(q=>!used.has(q.past));
  return fresh.length ? fresh : VERB_BANK;
}

function startTimer(player){
  gameState.timeLeft = 15;
  document.getElementById("timer-num").textContent = "15s";
  document.getElementById("sand-fill").style.height = "100%";
  gameState.timer = setInterval(()=>{
    gameState.timeLeft--;
    document.getElementById("timer-num").textContent = gameState.timeLeft+"s";
    document.getElementById("sand-fill").style.height = Math.max(0,(gameState.timeLeft/15*100))+"%";
    if(gameState.timeLeft<=0){
      clearInterval(gameState.timer);
      handleAnswer(false, player, null);
    }
  },1000);
}

function handleAnswer(correct, player, btnEl){
  clearInterval(gameState.timer);
  document.querySelectorAll("#q-options button").forEach(b=>b.disabled = true);
  const fb = document.getElementById("q-feedback");
  if(correct){
    fb.textContent = "✅ ¡Correcto!";
    fb.className = "mt-3 text-sm font-bold text-emerald-400";
    if(btnEl) btnEl.classList.add("ring-2","ring-emerald-400");
    logAction(`✅ <strong>${player.name}</strong> respondió correctamente (${gameState.currentQuestion.past} → ${gameState.currentQuestion.correct}).`, "success");
  } else {
    fb.textContent = "❌ Incorrecto. Pierdes este asalto.";
    fb.className = "mt-3 text-sm font-bold text-red-400";
    logAction(`❌ <strong>${player.name}</strong> falló (${gameState.currentQuestion.past} → ${gameState.currentQuestion.correct}).`, "fail");
  }

  setTimeout(()=>{
    document.getElementById("question-modal").classList.add("hidden");
    document.getElementById("question-modal").classList.remove("flex");
    if(correct){
      openChestModal(player, ()=> beginTargeting(player));
    } else {
      nextTurn();
    }
  }, 1100);
}

function beginTargeting(player){
  if(alivePlayers().length<=1) return endGame(alivePlayers()[0]);
  gameState.phase = "targeting";
  gameState.selectedAttacker = player.key;
  document.getElementById("target-banner").classList.remove("hidden");
  document.getElementById("target-banner").classList.add("flex");

  // if only one enemy alive, auto target after short delay for UX clarity (still allow click)
}

function resolveAttack(attackerKey, targetKey){
  gameState.phase = "resolving";
  document.getElementById("target-banner").classList.add("hidden");
  castleGroups[targetKey].pulse.material.opacity = 0;

  const attacker = gameState.players.find(p=>p.key===attackerKey);
  const target = gameState.players.find(p=>p.key===targetKey);

  fireProjectile(attackerKey, targetKey, ()=>{
    let dmg = 1;
    if(attacker.hammers>0){ dmg = 2; attacker.hammers--; logAction(`🔨 ${attacker.name} usó un Martillo de Guerra (+1 daño).`,"item"); }
    if(attacker.bombs>0){ dmg = 5; attacker.bombs--; logAction(`💣 ${attacker.name} desató una Súper Bomba!`, "item"); }
    if(target.shields>0){ target.shields--; dmg = 0; logAction(`🛡️ ${target.name} bloqueó el ataque con un Escudo.`, "item"); }

    target.hp = Math.max(0, target.hp - dmg);
    if(dmg>0) logAction(`⚔️ <strong>${attacker.name}</strong> atacó a <strong>${target.name}</strong> (-${dmg} HP, ${target.hp}/5).`, "attack");
    applyDamageVisuals(targetKey, target.hp);
    if(target.hp<=0){
      target.alive = false;
      logAction(`💀 <strong>${target.name}</strong> ha caído! El reino ${target.kingdom} se desmorona.`, "death");
    }
    renderRanking();
    setTimeout(()=>{
      if(alivePlayers().length<=1){ endGame(alivePlayers()[0]); }
      else nextTurn();
    }, 600);
  });
}

/* ===========================================================
   M. CHESTS
=========================================================== */
const CHEST_ITEMS = [
  {label:"🛡️ Escudo", type:"shield"},
  {label:"🔨 Martillo", type:"hammer"},
  {label:"💣 Súper Bomba", type:"bomb"},
  {label:"💨 Vacío", type:"empty"}
];

function openChestModal(player, onDone){
  const modal = document.getElementById("chest-modal");
  const grid = document.getElementById("chest-grid");
  const result = document.getElementById("chest-result");
  const closeBtn = document.getElementById("chest-close");
  grid.innerHTML = "";
  result.textContent = "";
  closeBtn.classList.add("hidden");
  modal.classList.remove("hidden"); modal.classList.add("flex");

  let opened = false;
  for(let i=0;i<10;i++){
    const chest = document.createElement("button");
    chest.type = "button";
    chest.className = "relative aspect-square rounded-lg bg-gradient-to-b from-amber-700 to-amber-900 border-2 border-amber-400/60 flex items-center justify-center text-2xl hover:scale-105 transition active:scale-95";
    chest.textContent = "🔒";
    chest.addEventListener("click", ()=>{
      if(opened) return;
      opened = true;
      document.querySelectorAll("#chest-grid button").forEach(b=>b.disabled=true);
      chest.style.transform = "rotateX(-35deg)";
      chest.style.transition = "transform .4s";
      const item = CHEST_ITEMS[Math.floor(Math.random()*CHEST_ITEMS.length)];
      setTimeout(()=>{
        chest.textContent = item.label;
        applyChestItem(player, item);
        result.textContent = item.type==="empty" ? `${player.name} no encontró nada en el cofre...` : `${player.name} obtuvo: ${item.label}!`;
        result.className = "mt-4 text-lg font-bold " + (item.type==="empty" ? "text-stone-400" : "text-amber-300");
        closeBtn.classList.remove("hidden");
      }, 420);
    });
    grid.appendChild(chest);
  }

  closeBtn.onclick = ()=>{
    modal.classList.add("hidden"); modal.classList.remove("flex");
    onDone();
  };
}

function applyChestItem(player, item){
  if(item.type==="shield") player.shields++;
  if(item.type==="hammer") player.hammers++;
  if(item.type==="bomb") player.bombs++;
  renderRanking();
}

/* ===========================================================
   N. HUD RENDER
=========================================================== */
function renderRanking(){
  const list = document.getElementById("ranking-list");
  const sorted = gameState.players.slice().sort((a,b)=> b.hp-a.hp);
  list.innerHTML = sorted.map(p=>{
    const hearts = "❤️".repeat(p.hp) + "🖤".repeat(5-p.hp);
    const items = `${p.shields?`🛡️${p.shields} `:""}${p.hammers?`🔨${p.hammers} `:""}${p.bombs?`💣${p.bombs}`:""}`;
    return `<div class="rounded-lg px-2 py-1.5 ${p.alive?'bg-black/30':'bg-black/60 opacity-50'} border border-amber-900/30">
      <div class="flex justify-between items-center">
        <span class="font-bold text-amber-100">${p.alive?'👑':'💀'} ${p.name}</span>
        <span class="text-[10px] text-amber-300/70">${p.kingdom}</span>
      </div>
      <div class="text-xs">${hearts}</div>
      <div class="text-[10px] text-amber-200/70">${items}</div>
    </div>`;
  }).join("");
}

function logAction(html, type){
  const list = document.getElementById("log-list");
  const colors = {success:"text-emerald-300", fail:"text-red-300", attack:"text-amber-200", death:"text-red-500 font-bold", item:"text-sky-300"};
  const div = document.createElement("div");
  div.className = "fade-in " + (colors[type]||"");
  div.innerHTML = html;
  list.prepend(div);
  while(list.children.length>40) list.removeChild(list.lastChild);
}

function endGame(winner){
  clearInterval(gameState.timer);
  gameState.phase = "ended";
  const modal = document.getElementById("win-modal");
  document.getElementById("win-title").textContent = winner ? `¡${winner.name.toUpperCase()} REINA SUPREMA!` : "EMPATE EN LAS RUINAS";
  document.getElementById("win-sub").textContent = winner ? `El reino de ${winner.kingdom} conquista Battle Castle.` : "Todos los reinos cayeron en la guerra.";
  modal.classList.remove("hidden"); modal.classList.add("flex");
}

/* ===========================================================
   O. WEB AUDIO — Procedural medieval war drums + fifths
=========================================================== */
let audioCtx;
function startAudio(){
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const master = audioCtx.createGain();
    master.gain.value = 0.18;
    master.connect(audioCtx.destination);

    let step = 0;
    const tempo = 480; // ms per beat
    const fifths = [196.0, 293.66, 246.94, 220.0]; // G3, D4, B3, A3 root-ish
    setInterval(()=>{
      if(audioCtx.state==="suspended") return;
      playDrum(master, step%4===0 ? 1 : 0.5);
      if(step%2===0) playFlute(master, fifths[(step/2)%fifths.length]);
      step++;
    }, tempo);

    document.body.addEventListener("click", ()=>{ if(audioCtx.state==="suspended") audioCtx.resume(); }, {once:true});
  }catch(e){ /* audio unsupported */ }
}

function playDrum(dest, vol){
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(110, t);
  osc.frequency.exponentialRampToValueAtTime(45, t+0.15);
  gain.gain.setValueAtTime(vol*0.5, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.18);
  osc.connect(gain); gain.connect(dest);
  osc.start(t); osc.stop(t+0.2);
}

function playFlute(dest, freq){
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.12, t+0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  osc.connect(gain); gain.connect(dest);
  osc.start(t); osc.stop(t+0.42);
}

})();
